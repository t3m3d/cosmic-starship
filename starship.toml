"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
palette = 'krypton'
scan_timeout = 30
command_timeout = 800

format = """
[](krypton_purple)\
[⋆·˚](bold fg:star_white bg:krypton_purple)\
[━━](bold fg:star_white bg:krypton_purple)\
[ t3m3d ](bold fg:krypton_bg bg:krypton_purple)\
[━━━━━](bold fg:star_white bg:krypton_purple)\
[✦](bold fg:star_white bg:krypton_purple)\
[ · ](bold fg:star_white bg:krypton_purple)\
$os\
$shell\
[ · ](bold fg:star_white bg:krypton_purple)\
$directory\
[ ✧ ](bold fg:star_white bg:krypton_purple)\
[](krypton_purple) \
$hostname\
${custom.github}\
$git_branch\
$git_status\
$git_state\
$git_metrics\
$nodejs\
$python\
$rust\
$golang\
$dotnet\
$java\
$kotlin\
$lua\
$swift\
$docker_context\
$cmd_duration\
$status\
$jobs\
$character"""

[palettes.krypton]
krypton_bg = '#05070C'
krypton_fg = '#E6DDFF'
krypton_dim = '#5C3A92'
krypton_purple = '#8B5CF6'
krypton_red = '#F14C4C'
star_white = '#FFFFFF'
star_dust = '#4B2A78'

[os]
disabled = false
format = '[$symbol](bold fg:krypton_bg bg:krypton_purple)'

[os.symbols]
Windows = ''
Macos = ''
Linux = ''

[shell]
disabled = false
format = '[ $indicator](bold fg:krypton_bg bg:krypton_purple)'
powershell_indicator = 'pwsh'
cmd_indicator = 'cmd'
bash_indicator = 'bash'
zsh_indicator = 'zsh'
fish_indicator = 'fish'
nu_indicator = 'nu'
unknown_indicator = 'shell'

[hostname]
ssh_only = true
format = '[@$hostname]($style) '
style = 'bold krypton_purple'

[directory]
format = '[ $path]($style)[$read_only]($read_only_style)'
style = 'bold fg:krypton_bg bg:krypton_purple'
read_only = ' '
read_only_style = 'bold fg:krypton_red bg:krypton_purple'
truncation_length = 3
truncation_symbol = '…/'
home_symbol = '~'

[custom.github]
description = 'GitHub remote'
command = 'git config --get remote.origin.url'
when = '''git config --get-regexp "^remote\..*\.url$" "github\.com[:/]"'''
require_repo = true
symbol = ' '
style = 'bold krypton_purple'
format = '[$symbol]($style)'

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '
symbol = ' '
style = 'bold krypton_purple'

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = 'bold krypton_purple'
conflicted = '='
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
up_to_date = '✓'
untracked = '?'
stashed = '*'
modified = '!'
staged = '+'
renamed = '»'
deleted = '×'

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = 'bold krypton_red'

[git_metrics]
disabled = false
format = '([+$added]($added_style))([-$deleted]($deleted_style) )'
added_style = 'bold krypton_purple'
deleted_style = 'bold krypton_purple'

[fill]
symbol = '·'
style = 'krypton_dim'

[cmd_duration]
min_time = 500
format = '[󱎫 $duration]($style) '
style = 'bold krypton_purple'
show_milliseconds = false

[jobs]
symbol = '✦'
format = '[$symbol$number](bold krypton_purple) '
number_threshold = 1

[status]
disabled = false
format = '[$symbol$status]($style) '
symbol = '✘ '
success_symbol = ''
style = 'bold krypton_red'

[time]
disabled = false
format = '[](krypton_purple)[ 󰥔 $time ](bold fg:krypton_bg bg:krypton_purple)[](krypton_purple)'
time_format = '%H:%M'
style = 'krypton_purple'

[character]
success_symbol = '[➜](bold krypton_purple)'
error_symbol = '[➜](bold krypton_red)'
vimcmd_symbol = '[❮](bold krypton_purple)'
vimcmd_replace_one_symbol = '[❮](bold krypton_purple)'
vimcmd_replace_symbol = '[❮](bold krypton_purple)'
vimcmd_visual_symbol = '[❮](bold krypton_purple)'

[nodejs]
format = '[$symbol($version )]($style)'
symbol = '⬢ '
style = 'bold krypton_purple'

[python]
format = '[$symbol${pyenv_prefix}(${version})( \($virtualenv\)) ]($style)'
symbol = ' '
style = 'bold krypton_purple'

[rust]
format = '[$symbol($version )]($style)'
symbol = ' '
style = 'bold krypton_purple'

[golang]
format = '[$symbol($version )]($style)'
symbol = ' '
style = 'bold krypton_purple'

[dotnet]
format = '[$symbol($version )(🎯 $tfm )]($style)'
symbol = ' '
style = 'bold krypton_purple'

[java]
format = '[$symbol($version )]($style)'
symbol = ' '
style = 'bold krypton_purple'

[kotlin]
format = '[$symbol($version )]($style)'
symbol = ' '
style = 'bold krypton_purple'

[lua]
format = '[$symbol($version )]($style)'
symbol = ' '
style = 'bold krypton_purple'

[swift]
format = '[$symbol($version )]($style)'
symbol = ' '
style = 'bold krypton_purple'

[docker_context]
format = '[$symbol$context]($style) '
symbol = ' '
style = 'bold krypton_purple'

[package]
disabled = true
