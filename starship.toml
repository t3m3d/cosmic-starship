"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
palette = 'krypton'
scan_timeout = 30
command_timeout = 800

format = """
[В·  Лҡ  вң§](star_dust)\
[в”Ғв”Ғ](bold krypton_dim)\
[в”Ғв”Ғв”Ғ](bold comet_mid)\
[в”Ғв”Ғв”Ғв”Ғ](bold krypton_purple)\
[вңҰ](bold star_white) \
[t3m3d](bold krypton_purple) \
[aboard](krypton_dim) \
$os\
$shell\
[in](krypton_dim) \
$directory\
$fill\
$cmd_duration\
$status\
$jobs\
$time\
$line_break\
[В·Лҡ](star_dust)\
[вң§](krypton_dim) \
$hostname\
${custom.github}\
$git_branch\
$git_status\
$git_state\
$git_metrics\
$nodejs\
$python\
$rust\
$golang\
$dotnet\
$java\
$kotlin\
$lua\
$swift\
$docker_context\
$character"""

[palettes.krypton]
krypton_bg = '#05070C'
krypton_fg = '#E6DDFF'
krypton_dim = '#5C3A92'
krypton_purple = '#8B5CF6'
krypton_red = '#F14C4C'
star_white = '#FFFFFF'
comet_mid = '#7047C7'
star_dust = '#352052'

[os]
disabled = false
format = '[$symbol](bold krypton_purple) '

[os.symbols]
Windows = 'п…ә'
Macos = 'п…№'
Linux = 'п…ј'

[shell]
disabled = false
format = '[$indicator](bold krypton_purple) '
powershell_indicator = 'pwsh'
cmd_indicator = 'cmd'
bash_indicator = 'bash'
zsh_indicator = 'zsh'
fish_indicator = 'fish'
nu_indicator = 'nu'
unknown_indicator = 'shell'

[hostname]
ssh_only = true
format = '[@$hostname]($style) '
style = 'bold krypton_purple'

[directory]
format = '[$path]($style)[$read_only]($read_only_style) '
style = 'bold krypton_fg'
read_only = ' пҖЈ'
read_only_style = 'bold krypton_red'
truncation_length = 3
truncation_symbol = 'вҖҰ/'
home_symbol = '~'

[custom.github]
description = 'GitHub remote'
command = 'git config --get remote.origin.url'
when = '''git config --get-regexp "^remote\..*\.url$" "github\.com[:/]"'''
require_repo = true
symbol = 'пӮӣ '
style = 'bold krypton_purple'
format = '[$symbol]($style)'

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '
symbol = 'оӮ  '
style = 'bold krypton_purple'

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = 'bold krypton_purple'
conflicted = '='
ahead = 'вҮЎ${count}'
behind = 'вҮЈ${count}'
diverged = 'вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}'
up_to_date = 'вң“'
untracked = '?'
stashed = '*'
modified = '!'
staged = '+'
renamed = 'В»'
deleted = 'Г—'

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = 'bold krypton_red'

[git_metrics]
disabled = false
format = '([+$added]($added_style))([-$deleted]($deleted_style) )'
added_style = 'bold krypton_purple'
deleted_style = 'bold krypton_purple'

[fill]
symbol = 'В·'
style = 'krypton_dim'

[cmd_duration]
min_time = 500
format = '[уұҺ« $duration]($style) '
style = 'bold krypton_purple'
show_milliseconds = false

[jobs]
symbol = 'вңҰ'
format = '[$symbol$number](bold krypton_purple) '
number_threshold = 1

[status]
disabled = false
format = '[$symbol$status]($style) '
symbol = 'вңҳ '
success_symbol = ''
style = 'bold krypton_red'

[time]
disabled = false
format = '[у°Ҙ” $time]($style)'
time_format = '%H:%M'
style = 'bold krypton_purple'

[character]
success_symbol = '[вңҰ](bold star_white) '
error_symbol = '[вңҰ](bold krypton_red) '
vimcmd_symbol = '[вқ®](bold krypton_purple)'
vimcmd_replace_one_symbol = '[вқ®](bold krypton_purple)'
vimcmd_replace_symbol = '[вқ®](bold krypton_purple)'
vimcmd_visual_symbol = '[вқ®](bold krypton_purple)'

[nodejs]
format = '[$symbol($version )]($style)'
symbol = 'в¬ў '
style = 'bold krypton_purple'

[python]
format = '[$symbol${pyenv_prefix}(${version})( \($virtualenv\)) ]($style)'
symbol = 'оҳҶ '
style = 'bold krypton_purple'

[rust]
format = '[$symbol($version )]($style)'
symbol = 'оһЁ '
style = 'bold krypton_purple'

[golang]
format = '[$symbol($version )]($style)'
symbol = 'оҳ§ '
style = 'bold krypton_purple'

[dotnet]
format = '[$symbol($version )(рҹҺҜ $tfm )]($style)'
symbol = 'оқҝ '
style = 'bold krypton_purple'

[java]
format = '[$symbol($version )]($style)'
symbol = 'оү– '
style = 'bold krypton_purple'

[kotlin]
format = '[$symbol($version )]($style)'
symbol = 'оҳҙ '
style = 'bold krypton_purple'

[lua]
format = '[$symbol($version )]($style)'
symbol = 'оҳ  '
style = 'bold krypton_purple'

[swift]
format = '[$symbol($version )]($style)'
symbol = 'оқ• '
style = 'bold krypton_purple'

[docker_context]
format = '[$symbol$context]($style) '
symbol = 'пҢҲ '
style = 'bold krypton_purple'

[package]
disabled = true
