"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
palette = 'krypton'
scan_timeout = 30
command_timeout = 800

format = """
[¬∑  Àö  ‚úß](star_dust)\
[‚îÅ‚îÅ](bold krypton_dim)\
[‚îÅ‚îÅ‚îÅ‚îÅ](bold krypton_purple)\
[‚òÑ](bold star_white)\
[  ](none)\
$username\
$os\
[‚åñ ](bold krypton_purple)\
$directory\
$git_branch\
$git_status\
$character"""

[username]
show_always = true
format = '[$user](bold krypton_purple) '

[palettes.krypton]
krypton_bg = '#05070C'
krypton_fg = '#E6DDFF'
krypton_dim = '#5C3A92'
krypton_purple = '#8B5CF6'
krypton_red = '#F14C4C'
star_white = '#FFFFFF'
comet_mid = '#7047C7'
star_dust = '#352052'

[os]
disabled = false
format = '[$symbol](bold krypton_purple)'

[os.symbols]
Windows = 'ÔÖ∫'
Macos = 'ÔÖπ'
Linux = 'ÔÖº'

[shell]
disabled = false
format = '[:$indicator](bold krypton_purple) '
powershell_indicator = 'pwsh'
cmd_indicator = 'cmd'
bash_indicator = 'bash'
zsh_indicator = 'zsh'
fish_indicator = 'fish'
nu_indicator = 'nu'
unknown_indicator = 'shell'

[hostname]
ssh_only = true
format = '[@$hostname]($style) '
style = 'bold krypton_purple'

[directory]
format = '[$path]($style)[$read_only]($read_only_style) '
style = 'bold krypton_fg'
read_only = ' ÔÄ£'
read_only_style = 'bold krypton_red'
truncation_length = 3
truncation_symbol = '‚Ä¶/'
home_symbol = '~'

[custom.github]
description = 'GitHub remote'
command = 'git config --get remote.origin.url'
when = '''git config --get-regexp "^remote\..*\.url$" "github\.com[:/]"'''
require_repo = true
symbol = 'ÔÇõ '
style = 'bold krypton_purple'
format = '[$symbol]($style)'

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '
symbol = 'ÓÇÝ '
style = 'bold krypton_purple'

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = 'bold krypton_purple'
conflicted = '='
ahead = '‚á°${count}'
behind = '‚á£${count}'
diverged = '‚áï‚á°${ahead_count}‚á£${behind_count}'
up_to_date = '‚úì'
untracked = '?'
stashed = '*'
modified = '!'
staged = '+'
renamed = '¬ª'
deleted = '√ó'

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = 'bold krypton_red'

[git_metrics]
disabled = false
format = '([+$added]($added_style))([-$deleted]($deleted_style) )'
added_style = 'bold krypton_purple'
deleted_style = 'bold krypton_purple'

[fill]
symbol = '¬∑'
style = 'krypton_dim'

[cmd_duration]
min_time = 500
format = '[Û±é´ $duration]($style) '
style = 'bold krypton_purple'
show_milliseconds = false

[jobs]
symbol = '‚ú¶'
format = '[$symbol$number](bold krypton_purple) '
number_threshold = 1

[status]
disabled = false
format = '[$symbol$status]($style) '
symbol = '‚úò '
success_symbol = ''
style = 'bold krypton_red'

[time]
disabled = false
format = '[Û∞•î $time]($style)'
time_format = '%H:%M'
style = 'bold krypton_purple'

[character]
success_symbol = '[‚ñ∂](bold star_white) '
error_symbol = '[‚ñ∂](bold krypton_red) '
vimcmd_symbol = '[‚ùÆ](bold krypton_purple)'
vimcmd_replace_one_symbol = '[‚ùÆ](bold krypton_purple)'
vimcmd_replace_symbol = '[‚ùÆ](bold krypton_purple)'
vimcmd_visual_symbol = '[‚ùÆ](bold krypton_purple)'

[nodejs]
format = '[$symbol($version )]($style)'
symbol = '‚¨¢ '
style = 'bold krypton_purple'

[python]
format = '[$symbol${pyenv_prefix}(${version})( \($virtualenv\)) ]($style)'
symbol = 'ÓòÜ '
style = 'bold krypton_purple'

[rust]
format = '[$symbol($version )]($style)'
symbol = 'Óû® '
style = 'bold krypton_purple'

[golang]
format = '[$symbol($version )]($style)'
symbol = 'Óòß '
style = 'bold krypton_purple'

[dotnet]
format = '[$symbol($version )(üéØ $tfm )]($style)'
symbol = 'Óùø '
style = 'bold krypton_purple'

[java]
format = '[$symbol($version )]($style)'
symbol = 'Óâñ '
style = 'bold krypton_purple'

[kotlin]
format = '[$symbol($version )]($style)'
symbol = 'Óò¥ '
style = 'bold krypton_purple'

[lua]
format = '[$symbol($version )]($style)'
symbol = 'ÓòÝ '
style = 'bold krypton_purple'

[swift]
format = '[$symbol($version )]($style)'
symbol = 'Óùï '
style = 'bold krypton_purple'

[docker_context]
format = '[$symbol$context]($style) '
symbol = 'Ôåà '
style = 'bold krypton_purple'

[package]
disabled = true
