"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
palette = 'krypton'
scan_timeout = 30
command_timeout = 800

format = """
[‚ē≠‚ú¶](krypton_dim)\
[Óā∂](nebula_pink)\
[ ‚ú¶ t3m3d // COSMIC ÔĄĶ ](bold fg:krypton_bg bg:nebula_pink)\
[Óāį](fg:nebula_pink bg:krypton_violet)\
$os\
$shell\
[Óāį](fg:krypton_violet bg:krypton_blue)\
$directory\
[Óāī](krypton_blue) \
$hostname\
[‚úß](nebula_pink) \
${custom.github}\
$git_branch\
$git_status\
$git_state\
$git_metrics\
$fill\
$cmd_duration\
$status\
$jobs\
$time\
$line_break\
[‚ēį‚čÜ](krypton_dim)\
[‚ú¶ ORBIT](bold krypton_cyan) \
$nodejs\
$python\
$rust\
$golang\
$dotnet\
$java\
$kotlin\
$lua\
$swift\
$docker_context\
$character"""

[palettes.krypton]
krypton_bg = '#05070C'
krypton_fg = '#D8DAD4'
krypton_dim = '#7E899B'
krypton_cyan = '#53E0D5'
krypton_violet = '#9B7BF2'
krypton_blue = '#3B8EEA'
krypton_green = '#23D18B'
krypton_amber = '#F5C451'
krypton_red = '#F14C4C'
nebula_pink = '#FF5FD7'
nebula_indigo = '#6A5CFF'
star_white = '#E8F7FF'

[os]
disabled = false
format = '[ $symbol](bold fg:krypton_bg bg:krypton_violet)'

[os.symbols]
Windows = 'Óė™'
Macos = 'ÔÖĻ'
Linux = 'ÔÖľ'

[shell]
disabled = false
format = '[¬∑ $indicator ](bold fg:krypton_bg bg:krypton_violet)'
powershell_indicator = 'pwsh'
cmd_indicator = 'cmd'
bash_indicator = 'bash'
zsh_indicator = 'zsh'
fish_indicator = 'fish'
nu_indicator = 'nu'
unknown_indicator = 'shell'

[hostname]
ssh_only = true
format = '[@$hostname]($style) '
style = 'bold krypton_blue'

[directory]
format = '[ ‚ĆĖ $path ]($style)[$read_only]($read_only_style)'
style = 'bold fg:krypton_bg bg:krypton_blue'
read_only = 'ÔÄ£ '
read_only_style = 'bold fg:krypton_red bg:krypton_blue'
truncation_length = 3
truncation_symbol = '‚Ä¶/'
home_symbol = '~'

[custom.github]
description = 'GitHub remote'
command = 'git config --get remote.origin.url'
when = '''git config --get-regexp "^remote\..*\.url$" "github\.com[:/]"'''
require_repo = true
symbol = 'Ôāõ '
style = 'bold krypton_cyan'
format = '[$symbol]($style)'

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '
symbol = 'Óā† '
style = 'bold krypton_violet'

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = 'bold krypton_amber'
conflicted = '='
ahead = '‚á°${count}'
behind = '‚á£${count}'
diverged = '‚áē‚á°${ahead_count}‚á£${behind_count}'
up_to_date = '‚úď'
untracked = '?'
stashed = '*'
modified = '!'
staged = '+'
renamed = '¬Ľ'
deleted = '√ó'

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = 'bold krypton_red'

[git_metrics]
disabled = false
format = '([+$added]($added_style))([-$deleted]($deleted_style) )'
added_style = 'bold krypton_green'
deleted_style = 'bold krypton_red'

[fill]
symbol = '¬∑'
style = 'krypton_dim'

[cmd_duration]
min_time = 500
format = '[ůĪéę $duration]($style) '
style = 'bold krypton_amber'
show_milliseconds = false

[jobs]
symbol = '‚ú¶'
format = '[$symbol$number](bold krypton_violet) '
number_threshold = 1

[status]
disabled = false
format = '[$symbol$status]($style) '
symbol = '‚úė '
success_symbol = ''
style = 'bold krypton_red'

[time]
disabled = false
format = '[Óā∂](krypton_blue)[ ůį•Ē $time ](bold fg:krypton_bg bg:krypton_blue)[Óāī](krypton_blue)'
time_format = '%H:%M'
style = 'krypton_blue'

[character]
success_symbol = '[‚ěú](bold krypton_cyan)'
error_symbol = '[‚ěú](bold krypton_red)'
vimcmd_symbol = '[‚Ěģ](bold krypton_green)'
vimcmd_replace_one_symbol = '[‚Ěģ](bold krypton_violet)'
vimcmd_replace_symbol = '[‚Ěģ](bold krypton_violet)'
vimcmd_visual_symbol = '[‚Ěģ](bold krypton_amber)'

[nodejs]
format = '[$symbol($version )]($style)'
symbol = '‚¨Ę '
style = 'bold krypton_green'

[python]
format = '[$symbol${pyenv_prefix}(${version})( \($virtualenv\)) ]($style)'
symbol = 'ÓėÜ '
style = 'bold krypton_amber'

[rust]
format = '[$symbol($version )]($style)'
symbol = 'Óě® '
style = 'bold krypton_red'

[golang]
format = '[$symbol($version )]($style)'
symbol = 'Óėß '
style = 'bold krypton_cyan'

[dotnet]
format = '[$symbol($version )(ūüéĮ $tfm )]($style)'
symbol = 'ÓĚŅ '
style = 'bold krypton_violet'

[java]
format = '[$symbol($version )]($style)'
symbol = 'ÓČĖ '
style = 'bold krypton_red'

[kotlin]
format = '[$symbol($version )]($style)'
symbol = 'Óėī '
style = 'bold krypton_violet'

[lua]
format = '[$symbol($version )]($style)'
symbol = 'Óė† '
style = 'bold krypton_blue'

[swift]
format = '[$symbol($version )]($style)'
symbol = 'ÓĚē '
style = 'bold krypton_amber'

[docker_context]
format = '[$symbol$context]($style) '
symbol = 'ÔĆą '
style = 'bold krypton_blue'

[package]
disabled = true
