"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
palette = 'krypton'
scan_timeout = 30
command_timeout = 800

format = """
[Ôò¡ÔöÇ](krypton_dim)\
[¯éÂ](krypton_violet)\
[ ´äÁ t3m3d ](bold fg:krypton_bg bg:krypton_violet)\
[¯é┤](krypton_violet) \
$os\
$hostname\
$directory\
${custom.github}\
$git_branch\
$git_status\
$git_state\
$fill\
$cmd_duration\
$status\
$time\
$line_break\
[Ôò░ÔöÇ](krypton_dim)\
[Ô£ª](bold krypton_cyan) \
$nodejs\
$python\
$rust\
$golang\
$dotnet\
$java\
$kotlin\
$lua\
$swift\
$docker_context\
$character"""

[palettes.krypton]
krypton_bg = '#05070C'
krypton_fg = '#D8DAD4'
krypton_dim = '#7E899B'
krypton_cyan = '#53E0D5'
krypton_violet = '#9B7BF2'
krypton_blue = '#3B8EEA'
krypton_green = '#23D18B'
krypton_amber = '#F5C451'
krypton_red = '#F14C4C'

[os]
disabled = false
format = '[$symbol](bold krypton_cyan) '

[os.symbols]
Windows = '¯ÿ¬'
Macos = '´à╣'
Linux = '´à╝'

[hostname]
ssh_only = true
format = '[@$hostname]($style) '
style = 'bold krypton_blue'

[directory]
format = '[$path]($style)[$read_only]($read_only_style) '
style = 'bold krypton_cyan'
read_only = ' ´Çú'
read_only_style = 'bold krypton_red'
truncation_length = 4
truncation_symbol = 'ÔÇª/'
home_symbol = '~'

[custom.github]
description = 'GitHub remote'
command = 'git config --get remote.origin.url'
when = '''git config --get-regexp "^remote\..*\.url$" "github\.com[:/]"'''
require_repo = true
symbol = '´éø '
style = 'bold krypton_fg'
format = '[$symbol]($style)'

[git_branch]
format = '[on](krypton_dim) [$symbol$branch(:$remote_branch)]($style) '
symbol = '¯éá '
style = 'bold krypton_violet'

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = 'bold krypton_amber'
conflicted = '='
ahead = 'Ôçí${count}'
behind = 'Ôçú${count}'
diverged = 'ÔçòÔçí${ahead_count}Ôçú${behind_count}'
up_to_date = 'Ô£ô'
untracked = '?'
stashed = '*'
modified = '!'
staged = '+'
renamed = '┬╗'
deleted = '├ù'

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = 'bold krypton_red'

[fill]
symbol = ' '

[cmd_duration]
min_time = 500
format = '[¾▒Ä½ $duration]($style) '
style = 'bold krypton_amber'
show_milliseconds = false

[status]
disabled = false
format = '[$symbol$status]($style) '
symbol = 'Ô£ÿ '
success_symbol = ''
style = 'bold krypton_red'

[time]
disabled = false
format = '[¾░Ñö $time]($style)'
time_format = '%H:%M'
style = 'krypton_dim'

[character]
success_symbol = '[ÔØ»](bold krypton_cyan)'
error_symbol = '[ÔØ»](bold krypton_red)'
vimcmd_symbol = '[ÔØ«](bold krypton_green)'
vimcmd_replace_one_symbol = '[ÔØ«](bold krypton_violet)'
vimcmd_replace_symbol = '[ÔØ«](bold krypton_violet)'
vimcmd_visual_symbol = '[ÔØ«](bold krypton_amber)'

[nodejs]
format = '[$symbol($version )]($style)'
symbol = 'Ô¼ó '
style = 'bold krypton_green'

[python]
format = '[$symbol${pyenv_prefix}(${version})( \($virtualenv\)) ]($style)'
symbol = '¯ÿå '
style = 'bold krypton_amber'

[rust]
format = '[$symbol($version )]($style)'
symbol = '¯×¿ '
style = 'bold krypton_red'

[golang]
format = '[$symbol($version )]($style)'
symbol = '¯ÿº '
style = 'bold krypton_cyan'

[dotnet]
format = '[$symbol($version )(­ƒÄ» $tfm )]($style)'
symbol = '¯Ø┐ '
style = 'bold krypton_violet'

[java]
format = '[$symbol($version )]($style)'
symbol = '¯ëû '
style = 'bold krypton_red'

[kotlin]
format = '[$symbol($version )]($style)'
symbol = '¯ÿ┤ '
style = 'bold krypton_violet'

[lua]
format = '[$symbol($version )]($style)'
symbol = '¯ÿá '
style = 'bold krypton_blue'

[swift]
format = '[$symbol($version )]($style)'
symbol = '¯Øò '
style = 'bold krypton_amber'

[docker_context]
format = '[$symbol$context]($style) '
symbol = '´îê '
style = 'bold krypton_blue'

[package]
disabled = true
